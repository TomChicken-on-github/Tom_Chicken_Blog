######## Tom_Chicken's Blog Stellar Theme Config ########

# 基础导航栏
nav:
  menu:
    首页: /
    归档: /archives/
    标签: /tags/
    关于: /about/
    友链: /friends/
  # 右侧图标按钮
  icons:
    github: https://github.com/TomChicken-on-github  # 改成你的 GitHub
    mail: mailto:Tom_Chicken@qq.com              # 改成你的邮箱
    rss: /atom.xml                           # 自动生成 RSS

# 首页封面配置
cover:
  title: Tom_Chicken's Blog
  subtitle: 時よ止まれ、お前は美しい
  # 封面背景图（可放 source/images/cover.jpg 或使用外链）
  background: https://api.imlazy.ink/img
  # 向下滚动提示
  scroll_down_icon: fa-solid fa-chevron-down
  
  # 封面社交链接（可选，如果不需要注释掉 social 部分）
  social:
    - icon: fa-brands fa-github
      url: https://github.com/TomChicken-on-github
      desc: GitHub
    - icon: fa-solid fa-envelope
      url: mailto:Tom_Chicken@qq.com
      desc: Email
    - icon: fa-brands fa-twitter
      url: https://x.com/Tom_Chicken114
      desc: Twitter
    - icon: fa-brands fa-qq      
      url: https://qm.qq.com/q/EDEkjS62pq

# 作者信息（显示在文章页侧边栏）
author:
  name: Tom_Chicken
  avatar: https://q1.qlogo.cn/g?b=qq&nk=2674407845&s=640 #头像
  # 或者本地图片：/images/avatar.png
  description: 时よ止まれ、お前は美しい
  location: 上海  # 可选，显示位置图标

# 侧边栏小组件
widgets:
  # 文章页右侧显示作者信息
  author: true
  # 显示目录（TOC）
  toc: true
  # 显示相关文章
  related: true
  
# 文章列表布局
index:
  # 文章摘要长度（字符数）
  excerpt_length: 200
  # 每页显示文章数（与 _config.yml 同步）
  per_page: 10
  
# 代码高亮（与 highlight.js 配合）
codeblock:
  # 复制按钮
  copy_btn: true
  # 显示语言标签
  language: true
  # 主题：default / mac / mac-dark（Stellar 内置）
  theme: mac-dark
  #  prismjs 高亮（如果你用 prismjs 替代 highlight.js）
  prismjs:
    light: one-light
    dark: one-dark

# 暗色模式
darkmode:
  # 默认 auto（跟随系统），可选：true（默认暗色）、false（默认亮色）
  default: auto
  # 切换按钮位置
  btn: true

# 评论系统（二选一，推荐 giscus 免服务器）
comments:
  service: giscus
  giscus:
    src: "https://giscus.app/client.js"
    data-repo: "TomChicken-on-github/Tom_Chicken_Blog"
    data-repo-id: "R_kgDOQzaoQg"
    data-category: "General"
    data-category-id: "DIC_kwDOQzaoQs4C3Pnl"
    data-mapping: "pathname"
    data-strict: "0"
    data-reactions-enabled: "1"
    data-emit-metadata: "0"
    data-input-position: "top"
    data-theme: "preferred_color_scheme"
    data-lang: "zh-CN"
    data-loading: "lazy"
    crossorigin: "anonymous"
    
  # 或者用 Waline（自建服务，功能更丰富）
  # service: waline
  # waline:
  #   serverURL: https://your-waline.vercel.app  # 你的 Waline 服务地址

# 搜索功能（需安装 hexo-generator-search）
search:
  enable: true
  # 搜索范围：post / page / all
  type: post
  placeholder: 搜索文章...

# 页脚配置
footer:
  # 左侧栏底部社交图标（简约线条风，单色，避免 icon 库缺失导致乱码）
  social:
    github:
      icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>'
      url: https://github.com/TomChicken-on-github
      title: GitHub
    email:
      icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m4 7 8 6 8-6"/></svg>'
      url: mailto:Tom_Chicken@qq.com
      title: Email
    twitter:
      icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l6.5 8.8L4.2 20h2.9l4.8-5.4L16 20h3.8l-6.8-9.1L19.2 4h-2.9l-4.5 5.1L7.9 4z"/></svg>'
      url: https://x.com/Tom_Chicken114
      title: Twitter
  # 版权信息
  copyright: '© 2024 - 2026 Tom_Chicken'
  # 备案号（如果有）
  # icp: 京ICP备xxxx号
  # 页脚链接
  links:
    Hexo: https://hexo.io
    Stellar: https://github.com/xaoxuu/hexo-theme-stellar
    Cloudflare: https://cloudflare.com

# 性能优化（Cloudflare Pages 已压缩，此处可选）
performance:
  # 图片懒加载
  lazyload: true
  # 是否使用 CDN 加速（Cloudflare 本身够快，可关闭）
  use_cdn: false

# 数学公式（按需开启，需要文章 front-matter 设置 math: true）
math:
  enable: false  # 默认关闭，需要时开启
  per_page: true
  
# Mermaid 图表（流程图等）
mermaid:
  enable: true
  
# 特效（适度使用，不要影响阅读）
effects:
  # 樱花飘落特效（可选）
  # sakura: true
  # 鼠标点击特效
  # click: love
  
# 文章分享按钮
share:
  enable: true
  twitter: true
  weibo: true

# 友链页面配置（如果使用 /friends/）
friends:
  layout: flow  # 瀑布流布局
  items:
    - title: WSMCS
      url: https://www.wsmcs.top
      description: 繁星之望MC服务器
      avatar: https://example.com/avatar.jpg
      # 如果开启了订阅验证
      # feed: https://example.com/atom.xml
